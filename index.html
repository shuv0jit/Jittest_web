<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- EMERGENCY FIX: Force-unregister corrupted Service Workers and Reload -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          let needsReload = false;
          for(let registration of registrations) { 
            registration.unregister(); 
            needsReload = true;
          }
          if (needsReload && !window.location.search.includes('reloaded')) {
            // Force a clean reload from the server once the bad workers are dead
            window.location.href = window.location.href + (window.location.href.includes('?') ? '&' : '?') + 'reloaded=true';
          }
        });
      }
    </script>

    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
